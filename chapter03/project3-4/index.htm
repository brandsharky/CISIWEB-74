<!DOCTYPE html>
<html>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Hands-on Project 3-4</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="modernizr.custom.05819.js"></script>
</head>

<body>
  <header>
    <h1>
      Hands-on Project 3-4
    </h1>
  </header>

  <article>
    <div id="results">
      <ul>
        <li id="item1"></li>
        <li id="item2"></li>
        <li id="item3"></li>
        <li id="item4"></li>
        <li id="item5"></li>
      </ul>
      <p id="resultsExpl"></p>
    </div>
    <form>
      <fieldset>
        <label for="toolBox" id="placeLabel">
          Type the name of a tool, then click Submit:
        </label>
        <input type="text" id="toolBox" />
      </fieldset>
      <fieldset>
        <button type="button" id="button">Submit</button>
      </fieldset>
    </form>
  </article>
  <script>
    var i = 1;
    var listItem = "";

    function processInput() {
      // tests and runs only when i < = 5
      if (i <= 5) {
        listItem = "item" + i;

        // changes value of listItem to value of tool box
        document.getElementById(listItem).innerHTML = document.querySelector("#toolBox").value;

        // resets toolbox
        document.getElementById("toolBox").value = "";

        // tells user when max is reached
        if (i === 5) {
          document.getElementById("resultsExpl").innerHTML = "Thanks for your suggestions";
        }
        i++;
      }
    };
    // call function when user clicks submit button
    document.getElementById("button").addEventListener("click", processInput, false);
  </script>
</body>

</html>
